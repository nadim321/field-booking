<div class="login-wrapper">
  <!-- Top bar -->
  <header class="top-bar">
    <a routerLink="/" class="back-link">
      <span class="arrow">&larr;</span> Back to Booking Site
    </a>
  </header>

  <!-- Login Card Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="card-header">
        <div class="icon-badge">🔒</div>
        <h2>Admin Authentication</h2>
        <p>Sign in to manage turf bookings, slot details, and view analytics.</p>
      </div>

      <div *ngIf="errorMsg" class="alert-error">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">{{ errorMsg }}</span>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="username">Admin Username</label>
          <input type="text" id="username" name="username" [(ngModel)]="username" class="form-control" required
            placeholder="e.g. admin" autocomplete="username" #userInput="ngModel" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" class="form-control" required
            placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.valid || loading">
          <span *ngIf="!loading">Secure Sign In</span>
          <span *ngIf="loading" class="spinner-inline"></span>
        </button>
      </form>

      <div class="card-footer">
        <p>Default credentials: <strong>admin</strong> / <strong>admin123</strong></p>
      </div>
    </div>
  </div>
</div>
